name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hook-verification:
    name: hook verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Hook tests
        run: scripts/hook-test

  rust:
    name: rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component clippy,rustfmt
          rustup default 1.85.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-targets --all-features --locked

      - name: Install dependency policy tools
        run: |
          cargo install --locked cargo-deny
          cargo install --locked cargo-audit

      - name: Dependency policy
        run: cargo deny check

      - name: Vulnerability scan
        run: cargo audit
