name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component clippy,rustfmt
          rustup default 1.85.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Dashboard frontend
        working-directory: crates/scryrs-dashboard/frontend
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run build

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-targets --all-features --locked

      - name: Docs publish verification
        run: scripts/verify-docs-publish

      - name: Install dependency policy tools
        # Keep workspace build/test on Rust 1.85.0, but install policy tools with
        # dedicated Rust 1.88 toolchain. cargo-deny 0.18.x cannot parse newer
        # advisory records that use CVSS 4.0.
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          cargo +1.88.0 install --locked cargo-deny@0.19.9
          cargo +1.88.0 install --locked cargo-audit@0.22.2

      - name: Dependency policy
        run: cargo deny check

      - name: Vulnerability scan
        run: cargo audit
