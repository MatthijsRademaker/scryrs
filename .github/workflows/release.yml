name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/matthijsrademaker/scryrs-server

jobs:
  # Create draft release first so /releases/latest/download never points at an
  # empty published release while matrix jobs are still uploading assets.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; reusing it."
          else
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG" --draft
          fi

  build-release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # The dashboard crate's build.rs compiles the frontend with Bun, so the
      # JS toolchain must be present for the --all-features release build.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0

      - name: Build
        run: cargo build -p scryrs-cli --release --locked --all-features

      - name: Stage asset and checksum
        id: stage
        run: |
          ASSET="scryrs-${{ matrix.target }}"
          cp target/release/scryrs "$ASSET"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.stage.outputs.asset }}

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET="${{ steps.stage.outputs.asset }}"
          gh release upload "${GITHUB_REF_NAME}" "$ASSET" "$ASSET.sha256" --clobber

  publish-release:
    needs:
      - create-release
      - build-release
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --draft=false

  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
