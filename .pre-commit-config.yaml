repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: check
        name: project check
        entry: scripts/check
        language: system
        pass_filenames: false
        always_run: true

      - id: test
        name: project test
        entry: scripts/test
        language: system
        pass_filenames: false
        always_run: true
