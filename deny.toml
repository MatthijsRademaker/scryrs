[licenses]
allow = ["MIT", "Apache-2.0", "BSD-3-Clause", "ISC", "Unicode-3.0"]

[bans]
multiple-versions = "warn"
# cargo-deny treats `workspace = true` path dependencies as wildcard requirements.
# Warn so real `*` requirements still surface without breaking workspace members.
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[advisories]
yanked = "warn"
ignore = []
